# Supabase project configuration.
#
# The functions listed here need JWT verification disabled because they are
# called by clients that cannot send a Supabase JWT:
#   - alexa-test:      Amazon Alexa calls it server-to-server (no user session).
#   - publish-version: the app calls it before/around auth; it only inserts a
#                      predefined, app-supplied release note (harmless).
#   - price-test:      a manual curl-invoked feasibility probe (no user session).
# Every other Edge Function is left untouched and keeps the platform default
# (verify_jwt = true), so the app's authenticated functions stay protected.
#
# The GitHub Actions workflow runs `supabase functions deploy --project-ref ...`,
# which reads this file and applies each function's settings on deploy.
# project_id is required by the pinned Supabase CLI when this file exists;
# it matches the --project-ref used in the workflow.
project_id = "wifuhcqpmvixipxejanb"

[functions.alexa-test]
verify_jwt = false

[functions.publish-version]
verify_jwt = false

[functions.price-test]
verify_jwt = false
